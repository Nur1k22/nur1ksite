<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #222228;
      --border: rgba(255,255,255,0.07);
      --accent: #c8ff57;
      --accent-dim: rgba(200,255,87,0.12);
      --text: #f0efe8;
      --text-muted: rgba(240,239,232,0.4);
      --op-color: #c8ff57;
      --eq-bg: #c8ff57;
      --eq-text: #0f0f11;
      --danger: #ff5757;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,87,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,87,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(200,255,87,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrapper { position: relative; z-index: 1; }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-left: 2px;
    }

    .calc {
      width: 340px;
      background: var(--surface);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(200,255,87,0.05),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .display {
      padding: 28px 28px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 6px;
    }

    .history {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .current {
      font-family: 'Space Mono', monospace;
      font-size: 38px;
      font-weight: 700;
      color: var(--text);
      text-align: right;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.15s ease;
      letter-spacing: -0.02em;
    }

    .current.small { font-size: 28px; }
    .current.tiny  { font-size: 20px; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .btn {
      background: var(--surface);
      border: none;
      padding: 0;
      height: 72px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: background 0.1s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.1s ease;
    }

    .btn:hover::after  { background: rgba(255,255,255,0.04); }
    .btn:active::after { background: rgba(255,255,255,0.1); }
    .btn.pressed { transform: scale(0.94); transition: transform 0.08s ease; }

    .btn.op {
      color: var(--op-color);
      background: var(--surface2);
      font-size: 18px;
    }
    .btn.op:hover::after { background: var(--accent-dim); }

    .btn.clear { color: var(--danger); font-size: 13px; letter-spacing: 0.05em; }
    .btn.ce    { font-size: 13px; letter-spacing: 0.03em; color: var(--text-muted); }
    .btn.pct   { color: var(--text-muted); }

    .btn.eq {
      background: var(--eq-bg);
      color: var(--eq-text);
      font-size: 22px;
      font-weight: 700;
    }
    .btn.eq:hover::after  { background: rgba(0,0,0,0.07); }
    .btn.eq:active::after { background: rgba(0,0,0,0.2); }

    .btn:first-child              { border-radius: 0 0 0 24px; }
    .calc .buttons .btn:last-child { border-radius: 0 0 24px 0; }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(200,255,87,0.25);
      transform: scale(0);
      animation: ripple-anim 0.4s linear;
      pointer-events: none;
    }
    .btn.eq .ripple { background: rgba(0,0,0,0.2); }

    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
    .display.shake { animation: shake 0.3s ease; }

    @keyframes flash {
      0%   { color: var(--accent); }
      100% { color: var(--text); }
    }
    .current.flash { animation: flash 0.4s ease; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="label">// Калькулятор v1.0</div>
    <div class="calc" id="calc">
      <div class="display" id="display">
        <div class="history" id="history"></div>
        <div class="current" id="current">0</div>
      </div>
      <div class="buttons">
        <button class="btn clear" data-action="clear">AC</button>
        <button class="btn ce"    data-action="ce">CE</button>
        <button class="btn pct"   data-action="percent">%</button>
        <button class="btn op"    data-action="op" data-op="÷">÷</button>

        <button class="btn" data-action="num" data-num="7">7</button>
        <button class="btn" data-action="num" data-num="8">8</button>
        <button class="btn" data-action="num" data-num="9">9</button>
        <button class="btn op" data-action="op" data-op="×">×</button>

        <button class="btn" data-action="num" data-num="4">4</button>
        <button class="btn" data-action="num" data-num="5">5</button>
        <button class="btn" data-action="num" data-num="6">6</button>
        <button class="btn op" data-action="op" data-op="−">−</button>

        <button class="btn" data-action="num" data-num="1">1</button>
        <button class="btn" data-action="num" data-num="2">2</button>
        <button class="btn" data-action="num" data-num="3">3</button>
        <button class="btn op" data-action="op" data-op="+">+</button>

        <button class="btn" data-action="toggle-sign">±</button>
        <button class="btn" data-action="num" data-num="0">0</button>
        <button class="btn" data-action="decimal">.</button>
        <button class="btn eq" data-action="equals">=</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
